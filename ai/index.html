<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI · Tamato</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>🍅</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/ai.css">
<link rel="stylesheet" href="/css/tm2.css">
<script>(function(){var t=localStorage.getItem('tm_theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t;})();</script>
</head>
<body>
<div class="ai-app">
  <!-- SIDEBAR -->
  <aside class="ai-sidebar">
    <div class="ai-sb-head">
      <a class="tm-wordmark" href="/dashboard.html" style="font-size:14px">Tamat<span>o</span></a>
      <button class="tm-btn tm-btn-ghost tm-btn-sm" id="newConvBtn">+ New</button>
    </div>
    <div class="ai-conv-list" id="convList"></div>
    <div class="ai-sb-foot">
      <a class="tm-btn tm-btn-text tm-btn-sm tm-grow" href="/dashboard.html">Dashboard</a>
      <button class="tm-theme-toggle" id="themeBtn">◐</button>
    </div>
  </aside>

  <div class="ai-sb-backdrop" id="aiSbBackdrop"></div>

  <!-- CENTER -->
  <section class="ai-center">
    <div class="ai-topbar">
      <button class="ai-sb-toggle" id="aiSbToggle" aria-label="Toggle conversations">☰</button>
      <b>Tamato AI</b>
      <div class="tm-row">
        <span class="tm-credit-pill"><span class="tomato">🍅</span> <span id="creditCount">—</span></span>
        <div class="tm-avatar" id="avatar" style="cursor:pointer" onclick="location.href='/account.html'">?</div>
      </div>
    </div>

    <div class="ai-messages" id="messages"></div>

    <div class="ai-input-wrap">
      <div class="ai-input-inner">
        <div class="ai-thumbs" id="thumbs"></div>
        <div class="ai-input-controls">
          <div class="ai-model-wrap">
            <button class="ai-model-btn" id="modelBtn">Pythm-4.5o mini ▾</button>
            <div class="ai-model-menu" id="modelMenu"></div>
          </div>
        </div>
        <div class="ai-input-row" style="position:relative">
          <button class="ai-icon-btn" id="attachBtn" title="Attach image">📎</button>
          <input type="file" id="fileInput" accept="image/png,image/jpeg,image/gif,image/webp" multiple hidden>
          <div class="tm-grow" style="position:relative">
            <textarea class="ai-textarea" id="text" placeholder="Message Tamato AI…  (type @ to reference a site)" rows="1"></textarea>
            <div class="mention-menu" id="mentionMenu"></div>
          </div>
          <button class="tm-btn tm-btn-primary" id="sendBtn">Send ▶</button>
        </div>
      </div>
    </div>
  </section>
</div>

<script type="module" src="/js/ai/chat.js"></script>
</body>
</html>
